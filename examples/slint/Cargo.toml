[package]
name = "slint_map_libre_native"
version = "0.1.0"
edition = "2024"

[features]
default = ["wgpu"]
wgpu = ["maplibre_native/wgpu"]
vulkan = ["maplibre_native/vulkan"]
opengl = ["maplibre_native/opengl"]
metal = ["maplibre_native/metal"]

[dependencies]
image = { workspace = true }
maplibre_native = { path = "../.." }
# slint = { version = "1.16", features = ["backend-android-activity-06", "unstable-wgpu-29"] }
slint = { git = "https://github.com/Murmele/slint.git", branch = "mm/wgpu-29", features = ["backend-android-activity-06", "renderer-femtovg-wgpu", "unstable-wgpu-29"] }

[build-dependencies]
slint-build = { git = "https://github.com/Murmele/slint.git", branch = "mm/wgpu-29" }
