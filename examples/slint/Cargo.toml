[package]
name = "slint_map_libre_native"
version = "0.1.0"
edition = "2024"

[features]
default = ["wgpu"]
wgpu = ["maplibre_native/wgpu"]
vulkan = ["maplibre_native/vulkan"]
opengl = ["maplibre_native/opengl"]
metal = ["maplibre_native/metal"]

[dependencies]
image = { workspace = true }
maplibre_native = { path = "../.." }
slint = { version = "1.15", features = ["backend-android-activity-06", "unstable-wgpu-28"] }

[build-dependencies]
slint-build = { version = "1.15" }
